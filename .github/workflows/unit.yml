name: Unit Tests
run-name: "Unit · ${{ github.ref_name }} · ${{ github.event_name }}"

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'Makefile'
      - 'go.mod'
      - 'go.sum'
      - 'deploy/examples/**'
      - 'src/**'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'Makefile'
      - 'go.mod'
      - 'go.sum'
      - 'deploy/examples/**'
      - 'src/**'

permissions:
  contents: read

concurrency:
  group: unit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit Check
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Unit check
        run: make ci-unit
