name: Standard Path Smoke
run-name: "Smoke · ${{ github.ref_name }} · ${{ github.event_name }}"

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'Makefile'
      - 'go.mod'
      - 'go.sum'
      - 'deploy/examples/**'
      - 'src/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'Makefile'
      - 'go.mod'
      - 'go.sum'
      - 'deploy/examples/**'
      - 'src/**'

permissions:
  contents: read

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Smoke check
        run: make ci-smoke
