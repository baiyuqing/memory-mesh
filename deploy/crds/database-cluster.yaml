apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: databaseclusters.ottoplus.io
spec:
  group: ottoplus.io
  names:
    kind: DatabaseCluster
    listKind: DatabaseClusterList
    plural: databaseclusters
    singular: databasecluster
    shortNames:
      - dbc
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: DatabaseCluster defines a managed database instance.
          properties:
            spec:
              type: object
              properties:
                engine:
                  type: string
                  description: "Database engine type (e.g. postgresql, mysql, redis)."
                  enum:
                    - postgresql
                    - mysql
                    - redis
                replicas:
                  type: integer
                  description: "Number of database replicas."
                  minimum: 1
                  maximum: 7
                  default: 1
                version:
                  type: string
                  description: "Database engine version (e.g. 16, 8.0, 7.2)."
                resources:
                  type: object
                  description: "Resource requests for each replica."
                  properties:
                    cpu:
                      type: string
                      default: "250m"
                    memory:
                      type: string
                      default: "512Mi"
                    storage:
                      type: string
                      default: "1Gi"
                config:
                  type: object
                  description: "Engine-specific configuration parameters."
                  x-kubernetes-preserve-unknown-fields: true
                backup:
                  type: object
                  description: "Backup configuration."
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    schedule:
                      type: string
                      description: "Cron expression for backup schedule."
                    destination:
                      type: string
                      description: "S3 bucket path for backups (e.g. s3://backups/dbc-name)."
                blocks:
                  type: object
                  description: "Explicit block composition. If omitted, a default composition is derived from engine/replicas/version fields."
                  properties:
                    composition:
                      type: array
                      description: "List of block instances in this cluster."
                      items:
                        type: object
                        required:
                          - kind
                          - name
                        properties:
                          kind:
                            type: string
                            description: "Block kind from registry (e.g. engine.postgresql, proxy.pgbouncer)."
                          name:
                            type: string
                            description: "Instance name, unique within this cluster."
                          parameters:
                            type: object
                            x-kubernetes-preserve-unknown-fields: true
                            description: "Block-specific parameter overrides."
                          inputs:
                            type: object
                            x-kubernetes-preserve-unknown-fields: true
                            description: "Inline input wiring. Key=input port name, value=blockName/portName."
                    wires:
                      type: array
                      description: "Explicit port wiring between blocks. Omit for auto-wiring."
                      items:
                        type: object
                        required:
                          - fromBlock
                          - fromPort
                          - toBlock
                          - toPort
                        properties:
                          fromBlock:
                            type: string
                          fromPort:
                            type: string
                          toBlock:
                            type: string
                          toPort:
                            type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                  description: "Current phase of the database cluster."
                  enum:
                    - Pending
                    - Provisioning
                    - Running
                    - Updating
                    - Failed
                    - Deleting
                readyReplicas:
                  type: integer
                  description: "Number of ready replicas."
                endpoint:
                  type: string
                  description: "Connection endpoint for the database."
                message:
                  type: string
                  description: "Human-readable status message."
                blocks:
                  type: array
                  description: "Per-block status."
                  items:
                    type: object
                    properties:
                      kind:
                        type: string
                      name:
                        type: string
                      phase:
                        type: string
                        enum: [Pending, Provisioning, Ready, Degraded, Failed, Deleting]
                      message:
                        type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Engine
          type: string
          jsonPath: .spec.engine
        - name: Replicas
          type: integer
          jsonPath: .spec.replicas
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Endpoint
          type: string
          jsonPath: .status.endpoint
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
