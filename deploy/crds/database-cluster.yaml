apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: databaseclusters.ottoplus.io
spec:
  group: ottoplus.io
  names:
    kind: DatabaseCluster
    listKind: DatabaseClusterList
    plural: databaseclusters
    singular: databasecluster
    shortNames:
      - dbc
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: DatabaseCluster defines a managed database instance.
          properties:
            spec:
              type: object
              required:
                - engine
                - replicas
              properties:
                engine:
                  type: string
                  description: "Database engine type (e.g. postgresql, mysql, redis)."
                  enum:
                    - postgresql
                    - mysql
                    - redis
                replicas:
                  type: integer
                  description: "Number of database replicas."
                  minimum: 1
                  maximum: 7
                  default: 1
                version:
                  type: string
                  description: "Database engine version (e.g. 16, 8.0, 7.2)."
                resources:
                  type: object
                  description: "Resource requests for each replica."
                  properties:
                    cpu:
                      type: string
                      default: "250m"
                    memory:
                      type: string
                      default: "512Mi"
                    storage:
                      type: string
                      default: "1Gi"
                config:
                  type: object
                  description: "Engine-specific configuration parameters."
                  x-kubernetes-preserve-unknown-fields: true
                backup:
                  type: object
                  description: "Backup configuration."
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    schedule:
                      type: string
                      description: "Cron expression for backup schedule."
                    destination:
                      type: string
                      description: "S3 bucket path for backups (e.g. s3://backups/dbc-name)."
            status:
              type: object
              properties:
                phase:
                  type: string
                  description: "Current phase of the database cluster."
                  enum:
                    - Pending
                    - Provisioning
                    - Running
                    - Updating
                    - Failed
                    - Deleting
                readyReplicas:
                  type: integer
                  description: "Number of ready replicas."
                endpoint:
                  type: string
                  description: "Connection endpoint for the database."
                message:
                  type: string
                  description: "Human-readable status message."
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Engine
          type: string
          jsonPath: .spec.engine
        - name: Replicas
          type: integer
          jsonPath: .spec.replicas
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Endpoint
          type: string
          jsonPath: .status.endpoint
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
