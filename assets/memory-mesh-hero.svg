<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Memory Mesh</title>
  <desc id="desc">A minimal hero showing AI agents connected through a shared memory mesh, with decisions, constraints, and handoffs flowing between them.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0D1117"/>
      <stop offset="0.5" stop-color="#111921"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="meshGlow" x1="440" y1="180" x2="840" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3EC8C8" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#FF9E54" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="600" y1="280" x2="680" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3EC8C8"/>
      <stop offset="1" stop-color="#2A9D9D"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="540" y1="240" x2="740" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3EC8C8" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#FF9E54" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="glowCenter" cx="640" cy="340" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3EC8C8" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#3EC8C8" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="nodeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <style>
      .mono { font-family: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
      .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#3EC8C8" stroke-width="0.5">
    <line x1="0" y1="80" x2="1280" y2="80"/><line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/><line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/><line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/><line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/><line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/><line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Center glow -->
  <circle cx="640" cy="340" r="220" fill="url(#glowCenter)"/>
  <ellipse cx="640" cy="340" rx="160" ry="160" fill="url(#meshGlow)" filter="url(#softGlow)"/>

  <!-- ===== Mesh connections (edges) ===== -->
  <line x1="280" y1="180" x2="640" y2="340" stroke="#3EC8C8" stroke-width="1.5" stroke-opacity="0.25" stroke-dasharray="6 10">
    <animate attributeName="stroke-dashoffset" from="0" to="-32" dur="3s" repeatCount="indefinite"/>
  </line>
  <line x1="1000" y1="180" x2="640" y2="340" stroke="#FF9E54" stroke-width="1.5" stroke-opacity="0.25" stroke-dasharray="6 10">
    <animate attributeName="stroke-dashoffset" from="0" to="-32" dur="3.5s" repeatCount="indefinite"/>
  </line>
  <line x1="280" y1="500" x2="640" y2="340" stroke="#6BA4D4" stroke-width="1.5" stroke-opacity="0.25" stroke-dasharray="6 10">
    <animate attributeName="stroke-dashoffset" from="0" to="-32" dur="2.8s" repeatCount="indefinite"/>
  </line>
  <line x1="1000" y1="500" x2="640" y2="340" stroke="#3EC8C8" stroke-width="1.5" stroke-opacity="0.25" stroke-dasharray="6 10">
    <animate attributeName="stroke-dashoffset" from="0" to="-32" dur="3.2s" repeatCount="indefinite"/>
  </line>

  <!-- Cross connections -->
  <line x1="280" y1="180" x2="1000" y2="180" stroke="#3EC8C8" stroke-width="0.8" stroke-opacity="0.08"/>
  <line x1="280" y1="500" x2="1000" y2="500" stroke="#3EC8C8" stroke-width="0.8" stroke-opacity="0.08"/>
  <line x1="280" y1="180" x2="280" y2="500" stroke="#3EC8C8" stroke-width="0.8" stroke-opacity="0.08"/>
  <line x1="1000" y1="180" x2="1000" y2="500" stroke="#3EC8C8" stroke-width="0.8" stroke-opacity="0.08"/>
  <line x1="280" y1="180" x2="1000" y2="500" stroke="#3EC8C8" stroke-width="0.5" stroke-opacity="0.05"/>
  <line x1="1000" y1="180" x2="280" y2="500" stroke="#3EC8C8" stroke-width="0.5" stroke-opacity="0.05"/>

  <!-- ===== Center hub ===== -->
  <circle cx="640" cy="340" r="72" fill="none" stroke="url(#ringGrad)" stroke-width="1.5" stroke-dasharray="4 8" opacity="0.5">
    <animateTransform attributeName="transform" type="rotate" from="0 640 340" to="360 640 340" dur="60s" repeatCount="indefinite"/>
  </circle>
  <circle cx="640" cy="340" r="56" fill="none" stroke="url(#ringGrad)" stroke-width="1" stroke-dasharray="2 6" opacity="0.3">
    <animateTransform attributeName="transform" type="rotate" from="360 640 340" to="0 640 340" dur="45s" repeatCount="indefinite"/>
  </circle>

  <!-- Core -->
  <circle cx="640" cy="340" r="36" fill="#111921" stroke="url(#coreGrad)" stroke-width="2.5"/>
  <circle cx="628" cy="328" r="4" fill="#3EC8C8"/>
  <circle cx="652" cy="328" r="4" fill="#3EC8C8"/>
  <circle cx="640" cy="352" r="4" fill="#3EC8C8"/>
  <line x1="628" y1="328" x2="652" y2="328" stroke="#3EC8C8" stroke-width="1.5" stroke-opacity="0.7"/>
  <line x1="628" y1="328" x2="640" y2="352" stroke="#3EC8C8" stroke-width="1.5" stroke-opacity="0.7"/>
  <line x1="652" y1="328" x2="640" y2="352" stroke="#3EC8C8" stroke-width="1.5" stroke-opacity="0.7"/>

  <!-- Orbiting dots -->
  <circle r="3.5" fill="#3EC8C8" opacity="0.8">
    <animateMotion dur="20s" repeatCount="indefinite" path="M640,268 A72,72 0 1,1 639.9,268"/>
  </circle>
  <circle r="3" fill="#FF9E54" opacity="0.7">
    <animateMotion dur="20s" repeatCount="indefinite" path="M640,268 A72,72 0 1,1 639.9,268" begin="-10s"/>
  </circle>

  <!-- ===== Agent nodes ===== -->
  <g filter="url(#nodeGlow)"><circle cx="280" cy="180" r="12" fill="#3EC8C8" opacity="0.25"/></g>
  <circle cx="280" cy="180" r="8" fill="#111921" stroke="#3EC8C8" stroke-width="2"/>
  <text x="280" y="160" text-anchor="middle" class="mono" fill="#3EC8C8" font-size="13" font-weight="600" opacity="0.9">Claude Code</text>

  <g filter="url(#nodeGlow)"><circle cx="1000" cy="180" r="12" fill="#FF9E54" opacity="0.25"/></g>
  <circle cx="1000" cy="180" r="8" fill="#111921" stroke="#FF9E54" stroke-width="2"/>
  <text x="1000" y="160" text-anchor="middle" class="mono" fill="#FF9E54" font-size="13" font-weight="600" opacity="0.9">Codex</text>

  <g filter="url(#nodeGlow)"><circle cx="280" cy="500" r="12" fill="#6BA4D4" opacity="0.25"/></g>
  <circle cx="280" cy="500" r="8" fill="#111921" stroke="#6BA4D4" stroke-width="2"/>
  <text x="280" y="530" text-anchor="middle" class="mono" fill="#6BA4D4" font-size="13" font-weight="600" opacity="0.9">Agent A</text>

  <g filter="url(#nodeGlow)"><circle cx="1000" cy="500" r="12" fill="#3EC8C8" opacity="0.25"/></g>
  <circle cx="1000" cy="500" r="8" fill="#111921" stroke="#3EC8C8" stroke-width="2"/>
  <text x="1000" y="530" text-anchor="middle" class="mono" fill="#3EC8C8" font-size="13" font-weight="600" opacity="0.9">New Agent</text>

  <!-- ===== Floating memory type tags ===== -->
  <g transform="translate(420, 230)">
    <rect x="0" y="0" width="100" height="26" rx="13" fill="#1C2A35" stroke="#3EC8C8" stroke-width="1" stroke-opacity="0.4"/>
    <text x="50" y="17" text-anchor="middle" class="mono" fill="#3EC8C8" font-size="11" font-weight="500">decision</text>
  </g>

  <g transform="translate(770, 230)">
    <rect x="0" y="0" width="104" height="26" rx="13" fill="#1C2A35" stroke="#FF9E54" stroke-width="1" stroke-opacity="0.4"/>
    <text x="52" y="17" text-anchor="middle" class="mono" fill="#FF9E54" font-size="11" font-weight="500">constraint</text>
  </g>

  <g transform="translate(410, 440)">
    <rect x="0" y="0" width="88" height="26" rx="13" fill="#1C2A35" stroke="#6BA4D4" stroke-width="1" stroke-opacity="0.4"/>
    <text x="44" y="17" text-anchor="middle" class="mono" fill="#6BA4D4" font-size="11" font-weight="500">handoff</text>
  </g>

  <g transform="translate(790, 440)">
    <rect x="0" y="0" width="88" height="26" rx="13" fill="#1C2A35" stroke="#3EC8C8" stroke-width="1" stroke-opacity="0.4"/>
    <text x="44" y="17" text-anchor="middle" class="mono" fill="#3EC8C8" font-size="11" font-weight="500">worklog</text>
  </g>

  <!-- ===== Title block ===== -->
  <text x="72" y="72" class="mono" fill="#3EC8C8" font-size="13" font-weight="600" letter-spacing="0.15em" opacity="0.7">SHARED ENGINEERING MEMORY</text>

  <text x="72" y="590" class="sans" fill="#E8F0F8" font-size="48" font-weight="700" letter-spacing="-0.02em">Memory Mesh</text>

  <text x="74" y="622" class="sans" fill="#7B8FA3" font-size="16" font-weight="400">Persistent context for AI agents — decisions, constraints, and handoffs that survive across sessions.</text>

  <!-- ===== Bottom-right badge ===== -->
  <g transform="translate(1040, 600)">
    <rect x="0" y="0" width="180" height="28" rx="14" fill="#1C2A35" stroke="#3EC8C8" stroke-width="1" stroke-opacity="0.2"/>
    <text x="90" y="18" text-anchor="middle" class="mono" fill="#7B8FA3" font-size="11">zero deps · local + mem9</text>
  </g>
</svg>
