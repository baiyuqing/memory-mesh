<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Memory Mesh cartoon hero</title>
  <desc id="desc">A cartoon-style illustration of coding agents sharing decisions, constraints, handoffs, and worklogs through a playful Memory Mesh network.</desc>
  <defs>
    <linearGradient id="bg" x1="76" y1="64" x2="1180" y2="654" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF2D9"/>
      <stop offset="0.45" stop-color="#F6FFFB"/>
      <stop offset="1" stop-color="#EAF0FF"/>
    </linearGradient>
    <linearGradient id="blob" x1="444" y1="184" x2="862" y2="530" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#173A5C"/>
      <stop offset="1" stop-color="#0F6A72"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1280" height="720" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#31556D" flood-opacity="0.16"/>
    </filter>
    <style>
      .eyebrow { font: 700 16px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; letter-spacing: 0.14em; text-transform: uppercase; fill: #16405A; }
      .title { font: 700 68px Georgia, "Times New Roman", serif; fill: #11253A; }
      .subtitle { font: 500 24px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #355A70; }
      .meshTitle { font: 700 38px Georgia, "Times New Roman", serif; fill: #FFF8EF; }
      .meshBody { font: 500 19px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #D9F3F2; }
      .tag { font: 700 15px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; fill: #17334A; }
      .bubble { font: 700 15px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; fill: #27475F; }
      .role { font: 700 22px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0E2A40; }
      .note { font: 500 17px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #476577; }
      .small { font: 700 13px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; fill: #5C7B90; letter-spacing: 0.06em; text-transform: uppercase; }
    </style>
  </defs>

  <rect x="24" y="24" width="1232" height="672" rx="36" fill="url(#bg)"/>

  <circle cx="146" cy="116" r="26" fill="#FFD89A" opacity="0.7"/>
  <circle cx="1118" cy="128" r="22" fill="#BEEDE2" opacity="0.8"/>
  <circle cx="1170" cy="596" r="28" fill="#D8E5FF" opacity="0.85"/>
  <circle cx="118" cy="586" r="18" fill="#FFE8BD" opacity="0.75"/>

  <text x="110" y="102" class="eyebrow">shared engineering memory</text>
  <text x="110" y="164" class="title">Memory Mesh</text>
  <text x="110" y="206" class="subtitle">Cartoon on the outside. Serious context routing under the hood.</text>

  <g filter="url(#shadow)">
    <path d="M468 204C522 158 618 142 704 154C790 166 866 210 884 284C902 358 866 444 794 496C722 548 614 562 526 522C438 482 372 390 392 314C404 264 428 238 468 204Z" fill="url(#blob)"/>
  </g>

  <ellipse cx="640" cy="358" rx="158" ry="118" fill="#0D2E42"/>
  <ellipse cx="640" cy="358" rx="84" ry="62" fill="#3EC8C8"/>
  <circle cx="545" cy="307" r="11" fill="#FFB565"/>
  <circle cx="737" cy="301" r="11" fill="#FFE1B4"/>
  <circle cx="547" cy="411" r="11" fill="#D7E6FF"/>
  <circle cx="737" cy="417" r="11" fill="#FFB565"/>
  <path d="M545 307L640 358L737 301" stroke="#FFC98E" stroke-width="5" stroke-linecap="round"/>
  <path d="M547 411L640 358L737 417" stroke="#92E4D8" stroke-width="5" stroke-linecap="round"/>

  <text x="556" y="286" class="meshTitle">Memory Mesh</text>
  <text x="525" y="504" class="meshBody">decisions + constraints + handoffs + worklogs</text>
  <text x="545" y="532" class="meshBody">project-scoped context for coding agents</text>

  <rect x="520" y="218" width="108" height="34" rx="17" fill="#FFE1B8"/>
  <text x="544" y="240" class="tag">project:repo</text>
  <rect x="640" y="218" width="118" height="34" rx="17" fill="#D5F3EC"/>
  <text x="668" y="240" class="tag">team:shared</text>
  <rect x="770" y="218" width="84" height="34" rx="17" fill="#DCE7FF"/>
  <text x="792" y="240" class="tag">kind:*</text>

  <path d="M328 280C402 280 446 294 484 320" stroke="#F0A85A" stroke-width="6" stroke-linecap="round" stroke-dasharray="10 14"/>
  <path d="M336 534C404 510 446 470 486 424" stroke="#6CA6CF" stroke-width="6" stroke-linecap="round" stroke-dasharray="10 14"/>
  <path d="M952 284C878 284 836 296 792 320" stroke="#F0A85A" stroke-width="6" stroke-linecap="round" stroke-dasharray="10 14"/>
  <path d="M948 520C874 500 832 462 794 420" stroke="#5BC2B6" stroke-width="6" stroke-linecap="round" stroke-dasharray="10 14"/>

  <g filter="url(#shadow)">
    <rect x="82" y="242" width="254" height="160" rx="28" fill="#FFFDF8"/>
    <circle cx="142" cy="304" r="34" fill="#FFD39D"/>
    <circle cx="130" cy="300" r="4.5" fill="#183349"/>
    <circle cx="154" cy="300" r="4.5" fill="#183349"/>
    <path d="M130 318C136 326 148 326 154 318" stroke="#183349" stroke-width="4" stroke-linecap="round"/>
    <path d="M114 282C120 270 132 264 144 264C160 264 174 274 176 288" stroke="#C8794B" stroke-width="8" stroke-linecap="round"/>
    <text x="190" y="290" class="role">Pathfinder</text>
    <text x="190" y="318" class="note">sets the direction</text>
    <rect x="112" y="344" width="104" height="32" rx="16" fill="#FFE4BE"/>
    <text x="136" y="365" class="bubble">decision</text>
    <rect x="224" y="344" width="92" height="32" rx="16" fill="#FFF1D8"/>
    <text x="242" y="365" class="bubble">boundary</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="86" y="456" width="262" height="164" rx="28" fill="#F8FCFF"/>
    <circle cx="148" cy="518" r="34" fill="#BFE1FF"/>
    <circle cx="136" cy="514" r="4.5" fill="#183349"/>
    <circle cx="160" cy="514" r="4.5" fill="#183349"/>
    <path d="M136 532C144 539 152 539 160 532" stroke="#183349" stroke-width="4" stroke-linecap="round"/>
    <rect x="122" y="476" width="52" height="18" rx="9" fill="#FFB565"/>
    <text x="196" y="502" class="role">Builder</text>
    <text x="196" y="530" class="note">ships the shape of the thing</text>
    <rect x="110" y="558" width="92" height="32" rx="16" fill="#D5E9FF"/>
    <text x="136" y="579" class="bubble">design</text>
    <rect x="212" y="558" width="108" height="32" rx="16" fill="#D7F3EC"/>
    <text x="234" y="579" class="bubble">handoff</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="940" y="244" width="248" height="160" rx="28" fill="#FFFDF8"/>
    <circle cx="1010" cy="306" r="34" fill="#C7F1E7"/>
    <circle cx="998" cy="302" r="4.5" fill="#183349"/>
    <circle cx="1022" cy="302" r="4.5" fill="#183349"/>
    <path d="M998 320C1005 326 1015 326 1022 320" stroke="#183349" stroke-width="4" stroke-linecap="round"/>
    <circle cx="1040" cy="278" r="12" fill="none" stroke="#183349" stroke-width="4"/>
    <path d="M1048 286L1062 300" stroke="#183349" stroke-width="4" stroke-linecap="round"/>
    <text x="1064" y="292" class="role">Spotter</text>
    <text x="1064" y="320" class="note">finds risks and missing proof</text>
    <rect x="964" y="344" width="94" height="32" rx="16" fill="#FFF1D8"/>
    <text x="988" y="365" class="bubble">risk</text>
    <rect x="1068" y="344" width="92" height="32" rx="16" fill="#DCE7FF"/>
    <text x="1092" y="365" class="bubble">gates</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="906" y="454" width="286" height="166" rx="28" fill="#F7FFFC"/>
    <circle cx="980" cy="518" r="34" fill="#FFE0AE"/>
    <circle cx="968" cy="514" r="4.5" fill="#183349"/>
    <circle cx="992" cy="514" r="4.5" fill="#183349"/>
    <path d="M968 533C976 540 984 540 992 533" stroke="#183349" stroke-width="4" stroke-linecap="round"/>
    <path d="M950 492C956 474 972 466 988 468C1000 470 1010 478 1014 490" stroke="#FF9E54" stroke-width="7" stroke-linecap="round"/>
    <text x="1030" y="502" class="role">Fresh Eyes</text>
    <text x="1030" y="530" class="note">loads context and keeps moving</text>
    <rect x="930" y="558" width="116" height="32" rx="16" fill="#D7F3EC"/>
    <text x="950" y="579" class="bubble">load context</text>
    <rect x="1058" y="558" width="106" height="32" rx="16" fill="#D5E9FF"/>
    <text x="1082" y="579" class="bubble">keep going</text>
  </g>

  <path d="M210 222C218 208 238 198 256 202" stroke="#FFB565" stroke-width="6" stroke-linecap="round"/>
  <path d="M1038 200C1052 186 1076 184 1094 194" stroke="#5BC2B6" stroke-width="6" stroke-linecap="round"/>
  <path d="M100 658C118 642 150 642 170 654" stroke="#6CA6CF" stroke-width="6" stroke-linecap="round"/>
  <path d="M1136 644C1156 632 1184 634 1198 650" stroke="#F0A85A" stroke-width="6" stroke-linecap="round"/>

  <rect x="862" y="118" width="276" height="84" rx="22" fill="#FFF8EF" stroke="#E7D7C2" stroke-width="2"/>
  <text x="890" y="148" class="small">why it sticks</text>
  <text x="890" y="178" class="note">The next person does not re-learn the project from scratch.</text>

  <rect x="102" y="118" width="210" height="38" rx="19" fill="#FFF6E6" stroke="#E7D0AB" stroke-width="2"/>
  <text x="128" y="142" class="bubble">shared memory, not chat drift</text>
</svg>
